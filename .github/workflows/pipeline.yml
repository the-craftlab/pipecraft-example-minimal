#=============================================================================
# PIPECRAFT MANAGED WORKFLOW
#=============================================================================

# ✅ YOU CAN CUSTOMIZE (preserved across 'pipecraft generate'):
#   - Custom jobs between the '# <--START CUSTOM JOBS-->' / '# <--END CUSTOM JOBS-->' markers
#   - The 'needs' list and 'runs-on' of managed jobs
#   - The workflow name

# 🔒 PIPECRAFT MANAGES (re-asserted on every generate; edits here are reset):
#   - Workflow triggers and the changes / version / tag / promote / release job logic
#   - The gate's 'if: always()' and its fail-on-failure step

# ♻️  Regeneration PRESERVES the customizations above. To reset managed sections
#    (including the gate) to template defaults, run: pipecraft generate --force

# 📌 VERSION PROMOTION BEHAVIOR:
#   - Only commits that trigger a version bump promote to staging/main
#   - Non-versioned commits (test, build, etc.) remain on develop

# 📖 Learn more: https://pipecraft.thecraftlab.dev
#=============================================================================

name: Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

run-name: "${{ github.event_name == 'pull_request' && !contains('develop,main', github.head_ref) && github.event.pull_request.title || github.ref_name }} #${{ inputs.run_number || github.run_number }}${{ inputs.version && format(' - {0}', inputs.version) || '' }}"

#Git fetch depth configuration
# - FETCH_DEPTH_AFFECTED: For change detection and Nx affected analysis
#   Lower values (50-100) improve performance, higher values (200+) improve accuracy
#   Use 0 for complete history if your branches diverge significantly
# - FETCH_DEPTH_VERSIONING: For semantic version calculation (needs git tags)
#   Should almost always be 0 to access all tags

#Runtime versions
# Update these to match your project's requirements without regenerating workflows
env:
  FETCH_DEPTH_AFFECTED: "100"
  FETCH_DEPTH_VERSIONING: "0"
  NODE_VERSION: "22"
  PNPM_VERSION: 10.6.2

on:
  workflow_dispatch:
    inputs:
      version:
        description: The version to deploy
        required: false
        type: string
      baseRef:
        description: The base reference for comparison
        required: false
        type: string
      run_number:
        description: The original run number from develop branch
        required: false
        type: string
      commitSha:
        description: The exact commit SHA to checkout and test
        required: false
        type: string
      beforeSha:
        description: The commit SHA before promotion (for change detection)
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: The version to deploy
        required: false
        type: string
      baseRef:
        description: The base reference for comparison
        required: false
        type: string
      run_number:
        description: The original run number from develop branch
        required: false
        type: string
      commitSha:
        description: The exact commit SHA to checkout and test
        required: false
        type: string
      beforeSha:
        description: The commit SHA before promotion (for change detection)
        required: false
        type: string
  push:
    branches:
      - develop
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - develop
jobs:
  
  #=============================================================================
  # CHANGES DETECTION (⚠️  Managed by Pipecraft - do not modify)
  #=============================================================================
  # This job detects which domains have changed.
  # Domain definitions are baked into this file at generation time.
  # Run 'pipecraft generate' to update when domains change in .pipecraftrc.

  changes:
    runs-on: ubuntu-latest
    env:
      # Domain configuration (regenerated by pipecraft generate)
      DOMAINS: |
        app:
          paths:
          - 'src/**'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commitSha || github.sha }}
          fetch-depth: ${{ env.FETCH_DEPTH_AFFECTED }}
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          baseRef: ${{ inputs.baseRef || 'main' }}
          beforeSha: ${{ inputs.beforeSha || github.event.before || '' }}
          domains-config: ${{ env.DOMAINS }}
    outputs:
      app: ${{ fromJSON(steps.detect.outputs.changes).app }}
      changes: ${{ steps.detect.outputs.changes }}
      affectedDomains: ${{ steps.detect.outputs.affectedDomains }}

  #=============================================================================
  # VERSIONING (⚠️  Managed by Pipecraft - do not modify)
  #=============================================================================
  # Calculates the next semantic version based on conventional commits.
  # Only runs on push events (skipped on pull requests).

  version:
    needs: [ changes ]
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commitSha || github.sha }}
          fetch-depth: ${{ env.FETCH_DEPTH_VERSIONING }}
      - uses: ./.github/actions/calculate-version
        id: version
        with:
          baseRef: ${{ inputs.baseRef || 'main' }}
          version: ${{ inputs.version }}
          node-version: ${{ env.NODE_VERSION }}
          commitSha: ${{ inputs.commitSha }}
      - name: Warn if no version resolved on the final branch
        if: ${{ github.ref_name == 'main' && steps.version.outputs.version == '' }}
        shell: bash
        run: |
          echo "::warning title=pipecraft::No version resolved on final branch 'main' — tag/release will be skipped. This usually means the promote PR was merged as a merge commit, leaving the version tag off HEAD. Merge promote PRs with fast-forward or rebase so the tag lands on HEAD."
    outputs:
      version: ${{ steps.version.outputs.version }}

  # <--START CUSTOM JOBS-->

  #=============================================================================
  #TESTING JOBS (✅ Customize these with your test logic)
  #=============================================================================
  #These jobs run tests for each domain when changes are detected.
  #Replace the TODO comments with your actual test commands.
  
  test-app:
  
    #=============================================================================
    #TESTING JOBS (✅ Customize these with your test logic)
    #=============================================================================
    #These jobs run tests for each domain when changes are detected.
    #Replace the TODO comments with your actual test commands.
  
    {
      needs: changes,
      if: "${{ needs.changes.outputs.app == 'true' }}",
      runs-on: ubuntu-latest,
      steps:
        [
          { uses: actions/checkout@v4, with: { ref: "${{ inputs.commitSha || github.sha }}" } },
          # TODO: Replace with your app test logic
          {
              name: Run app tests,
              run: 'echo "Running tests for app domain"
  
                echo "Replace this with your actual test commands"
  
                # Example: npm test -- --testPathPattern=app
  
                '
            }
        ]
    }

  #=============================================================================
  #DEPLOYMENT JOBS (✅ Customize these with your deploy logic)
  #=============================================================================
  #These jobs deploy each domain when changes are detected and tests pass.
  #Replace the TODO comments with your actual deployment commands.
  
  deploy-app:
  
    #=============================================================================
    #DEPLOYMENT JOBS (✅ Customize these with your deploy logic)
    #=============================================================================
    #These jobs deploy each domain when changes are detected and tests pass.
    #Replace the TODO comments with your actual deployment commands.
  
    {
      needs: [ version, changes ],
      if: "${{ always() && needs.version.result == 'success' && needs.changes.outputs.app == 'true' }}",
      runs-on: ubuntu-latest,
      steps:
        [
          { uses: actions/checkout@v4, with: { ref: "${{ inputs.commitSha || github.sha }}" } },
          # TODO: Replace with your app deployment logic
          {
              name: Deploy app,
              run: 'echo "Deploying app with version ${{ needs.version.outputs.version }}"
  
                echo "Replace this with your actual deploy commands"
  
                # Example: npm run deploy:app
  
                '
            }
        ]
    }

  # <--END CUSTOM JOBS-->


  #=============================================================================
  # GATE (Managed by Pipecraft)
  #=============================================================================
  # Ensures prerequisite jobs pass before tag/promote/release run.

  # ✅ CUSTOMIZABLE (preserved on regeneration): add your test/build jobs to 'needs'.
  #    The gate checks every job in 'needs' automatically (via needs.*.result), so you
  #    do NOT edit the 'if' or the steps.
  #    Example: needs: [changes, version, test-myapp, build-myapp]

  # 🔒 MANAGED (re-asserted on every 'pipecraft generate'): 'if: always()' and the
  #    fail-on-failure step. This keeps the gate from being silently disabled. Run
  #    'pipecraft generate --force' to reset the whole gate to template defaults.
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any prerequisite job failed
        if: "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}"
        run: echo "::error::A prerequisite job failed - blocking progression" && exit 1
      - name: Gate passed
        run: echo "All prerequisite jobs succeeded or were skipped - gate allows progression"
    needs:
      - changes
      - version
    if: "${{ always() }}"

  #=============================================================================
  # TAG (⚠️  Managed by Pipecraft - customizable needs and if)
  #=============================================================================
  # Creates git tags and promotes code through branch flow.
  # The 'needs' and 'if' fields are customizable and will be preserved.
  # All other fields (runs-on, steps) are managed by Pipecraft.

  tag:
    needs:
      - version
      - gate
    if: ${{
        always() &&
        github.event_name != 'pull_request' &&
        github.ref_name == 'develop' &&
        needs.version.result == 'success' &&
        needs.version.outputs.version != '' &&
        needs.gate.result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commitSha || github.sha }}
          fetch-depth: ${{ env.FETCH_DEPTH_VERSIONING }}
      - uses: ./.github/actions/create-tag
        with:
          version: ${{ needs.version.outputs.version }}

  #=============================================================================
  # PROMOTE (⚠️  Managed by Pipecraft - do not modify)
  #=============================================================================
  # Promotes code from develop to staging or main via PR.

  promote:
    needs: [ version, tag ]
    if: ${{
        always() &&
        (github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch') &&
        needs.version.result == 'success' &&
        needs.version.outputs.version != '' &&
        (needs.tag.result == 'success' ||
        needs.tag.result == 'skipped') &&
        (github.ref_name == 'develop')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commitSha || github.sha }}
          fetch-depth: ${{ env.FETCH_DEPTH_VERSIONING }}
      - uses: ./.github/actions/promote-branch
        with:
          version: ${{ needs.version.outputs.version }}
          sourceBranch: ${{ github.ref_name }}
          targetBranch: ${{ 'main' }}
          autoPromote: ${{ (github.ref_name == 'develop' && 'true') || 'false' }}
          run_number: ${{ inputs.run_number || github.run_number }}

  #=============================================================================
  # RELEASE (⚠️  Managed by Pipecraft - do not modify)
  #=============================================================================
  # Creates a release for the version.

  release:
    needs: [ tag, version ]
    if: ${{
        always() &&
        github.ref_name == 'main' &&
        needs.version.result == 'success' &&
        needs.version.outputs.version != '' &&
        (needs.tag.result == 'success' ||
        needs.tag.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.commitSha || github.sha }}
          fetch-depth: ${{ env.FETCH_DEPTH_VERSIONING }}
      - uses: ./.github/actions/create-release
        with:
          version: ${{ needs.version.outputs.version }}
          commitSha: ${{ inputs.commitSha }}
